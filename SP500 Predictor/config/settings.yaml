# ============================================================
# SP500 Predictor — Central Configuration
# ============================================================

# --- Data Sources ---
data:
  assets: ["SPY", "QQQ"]
  yfinance:
    hourly_period: "5d"
    hourly_interval: "1m"
    daily_period: "60d"
    daily_interval: "1h"
    training_period: "7d"

# --- Sentiment Analysis ---
sentiment:
  enabled: true
  sources:
    fear_greed:
      enabled: true
      url: "https://api.alternative.me/fng/?limit=30&format=json"
      weight_crypto: 0.5
      weight_equity: 0.2
    vix:
      enabled: true
      weight_crypto: 0.2
      weight_equity: 0.4
    momentum:
      enabled: true
      weight_crypto: 0.3
      weight_equity: 0.4
  cache_ttl_minutes: 15
  display_averages: true

# --- Model Parameters ---
model:
  type: "lightgbm"
  hyperparameters:
    n_estimators: 200
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
  auto_retrain: true
  model_dir: "model"

# --- Trading / Scanner ---
trading:
  min_edge_pct: 8
  max_kelly_pct: 6
  moneyness_filter_pct: 2
  scan_assets: ["SPY", "QQQ"]
  bankroll_default: 1000
  kelly_fraction: 0.25       # Quarter-Kelly sizing

# --- Telegram Alerts ---
telegram:
  enabled: true
  min_edge_alert: 15
  vix_emergency_threshold: 45
  weather_auto_alert: true

# --- Dashboard ---
dashboard:
  theme: "dark"
  default_asset: "SPX"
  default_wager: 100
  show_sentiment: true
  sentiment_expanded: false  # collapsed by default in Edge Finder tab

# --- Sports Analytics Engines ---
sports:
  nba:
    enabled: true
    balldontlie_base_url: "https://www.balldontlie.io/api/v1"
    min_edge_pct: 12          # Min model vs Kalshi edge to flag a signal
    rolling_games: 5          # Rolling game window for usage/pts averages
    injury_poll_interval: 300 # Seconds between injury report checks
  f1:
    enabled: true
    cache_dir: "f1_cache"
    openf1_base_url: "https://api.openf1.org/v1"
    min_edge_pct: 10
    live_poll_interval: 60    # Seconds between live lap polls during race weekend

# --- Crypto Microstructure ---
crypto:
  enabled: true
  symbols: ["BTCUSDT", "ETHUSDT", "SOLUSDT"]
  binance_ws_base: "wss://stream.binance.com:9443/ws"
  binance_futures_base: "https://fapi.binance.com"
  funding_rate_window: 7      # Days for z-score calculation
  ob_imbalance_depth: 10      # Order book levels to sum for imbalance
  ai_scrutinizer:
    enabled: true
    headline_lookback_minutes: 15
    abort_on_chaos: true

# --- FastAPI Layer ---
api:
  host: "0.0.0.0"
  port: 8000
  reload: false               # Set true for local dev
  cors_origins:
    - "http://localhost:5173"  # Vite dev server
    - "http://localhost:3000"  # CRA fallback

# --- Paper Trading ---
paper_trading:
  enabled: true               # ALWAYS true until 200+ trade proof of edge
  log_to_supabase: true
  min_ev_trades_before_live: 200
  bankroll_paper: 1000        # Virtual bankroll for sizing simulations
